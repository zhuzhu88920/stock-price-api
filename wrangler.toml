name = "stock-price-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV 命名空间 — 用于缓存股价数据
# 首次部署前需创建: wrangler kv namespace create STOCK_CACHE
# 如果需要 preview 环境: wrangler kv namespace create STOCK_CACHE --preview
[[kv_namespaces]]
binding = "STOCK_CACHE"
id = "617edac047b54dedbb06e9acb359616b"
# preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"

# Cron Trigger — 每 10 分钟的偏移1分钟执行（8:01, 8:11, 8:21...）
[triggers]
crons = ["1,11,21,31,41,51 * * * *"]

[observability]
enabled = true
